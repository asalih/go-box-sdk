version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  exclusions:
    generated: lax
    rules:
      # Test files may ignore errors on cleanup paths.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
